services:
  - type: web
    name: agentflow-backend
    runtime: python
    rootDir: agent-flow-builder/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: MOCK_MODE
        value: false
      - key: PYTHON_VERSION
        value: 3.12.3
